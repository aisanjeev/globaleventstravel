# =============================================================================
# Global Events Travels - Admin Deployment Workflow
# =============================================================================
# Deploys admin/ (Next.js 14 dashboard) to VPS.
# Source is copied to VPS, env written before build, app served via
# `next start` systemd service.
#
# DEPLOYMENT STRATEGY:
# --------------------
# - Push to `develop` branch -> STAGING  (port 3004, staging.admin.globaleventstravels.com)
# - Push to `main` branch    -> PRODUCTION (port 3010, admin.globaleventstravels.com)
#
# REQUIRED GITHUB SECRETS:
# ------------------------
# Repository Secrets:
#   SSH_HOST, SSH_USER, SSH_PASSWORD, SSH_PORT (optional, default 22)
#
# Environment Secrets:
#   ENV_FILE_ADMIN - Full .env.local contents for this environment
#                    (NEXT_PUBLIC_API_URL, etc.)
#
# VPS PREREQUISITES:
# ------------------
# - Node.js 20+ installed
# - mkdir -p /home/vels-staging-admin/htdocs/staging.admin.globaleventstravels.com
# - mkdir -p /home/globaleventstravels-admin/htdocs/admin.globaleventstravels.com
# =============================================================================

name: Deploy Admin to VPS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'admin/**'
      - '.github/workflows/deploy-admin.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# =============================================================================
# STAGING DEPLOYMENT
# =============================================================================
jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    environment:
      name: staging
      url: https://staging.admin.globaleventstravels.com

    env:
      DEPLOY_PATH: /home/vels-staging-admin/htdocs/staging.admin.globaleventstravels.com
      SERVICE_NAME: globaleventstravels-staging-admin
      APP_PORT: 3004

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files to Staging VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "admin/"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1
          rm: false

      - name: Setup and restart staging service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            echo "=========================================="
            echo "Global Events Travels STAGING Admin Deployment"
            echo "=========================================="

            DEPLOY_DIR="${{ env.DEPLOY_PATH }}"
            SERVICE_NAME="${{ env.SERVICE_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"

            cd "$DEPLOY_DIR"

            echo "Writing .env.local file..."
            cat > .env.local << 'ENVEOF'
            ${{ secrets.ENV_FILE_ADMIN }}
            ENVEOF
            chmod 600 .env.local

            echo "Cleaning previous build..."
            rm -rf .next 2>/dev/null || true

            echo "Installing dependencies (npm ci)..."
            npm ci --no-audit --no-fund

            echo "Building Next.js app..."
            npm run build

            echo "Setting up systemd service..."
            cat > /etc/systemd/system/${SERVICE_NAME}.service << SERVICEEOF
            [Unit]
            Description=Global Events Travels Staging Admin Service
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=${DEPLOY_DIR}
            Environment="NODE_ENV=production"
            Environment="PORT=${APP_PORT}"
            Environment="PATH=/usr/local/bin:/usr/bin:/bin"
            ExecStart=$(which node) node_modules/.bin/next start -p ${APP_PORT}
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            echo "Restarting service..."
            systemctl daemon-reload
            systemctl enable ${SERVICE_NAME}.service 2>/dev/null || true

            PID=$(lsof -t -i:${APP_PORT} 2>/dev/null) || true
            if [ -n "$PID" ]; then
                kill -9 $PID 2>/dev/null || true
                sleep 2
            fi

            systemctl restart ${SERVICE_NAME}.service
            sleep 5

            echo "Health check..."
            if systemctl is-active --quiet ${SERVICE_NAME}.service; then
                echo "Staging admin service is running on port ${APP_PORT}!"
            else
                echo "Service failed!"
                journalctl -u ${SERVICE_NAME}.service --no-pager -n 30
                exit 1
            fi

            echo "=========================================="
            echo "STAGING deployment complete!"
            echo "   URL: https://staging.admin.globaleventstravels.com"
            echo "=========================================="

# =============================================================================
# PRODUCTION DEPLOYMENT
# =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    environment:
      name: production
      url: https://admin.globaleventstravels.com

    env:
      DEPLOY_PATH: /home/globaleventstravels-admin/htdocs/admin.globaleventstravels.com
      SERVICE_NAME: globaleventstravels-admin
      APP_PORT: 3010

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files to Production VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "admin/"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1
          rm: false

      - name: Setup and restart production service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            echo "=========================================="
            echo "Global Events Travels PRODUCTION Admin Deployment"
            echo "=========================================="

            DEPLOY_DIR="${{ env.DEPLOY_PATH }}"
            SERVICE_NAME="${{ env.SERVICE_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"

            cd "$DEPLOY_DIR"

            echo "Writing .env.local file..."
            cat > .env.local << 'ENVEOF'
            ${{ secrets.ENV_FILE_ADMIN }}
            ENVEOF
            chmod 600 .env.local

            echo "Cleaning previous build..."
            rm -rf .next 2>/dev/null || true

            echo "Installing dependencies (npm ci)..."
            npm ci --no-audit --no-fund

            echo "Building Next.js app..."
            npm run build

            echo "Setting up systemd service..."
            cat > /etc/systemd/system/${SERVICE_NAME}.service << SERVICEEOF
            [Unit]
            Description=Global Events Travels Production Admin Service
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=${DEPLOY_DIR}
            Environment="NODE_ENV=production"
            Environment="PORT=${APP_PORT}"
            Environment="PATH=/usr/local/bin:/usr/bin:/bin"
            ExecStart=$(which node) node_modules/.bin/next start -p ${APP_PORT}
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            echo "Restarting service..."
            systemctl daemon-reload
            systemctl enable ${SERVICE_NAME}.service 2>/dev/null || true

            PID=$(lsof -t -i:${APP_PORT} 2>/dev/null) || true
            if [ -n "$PID" ]; then
                kill -9 $PID 2>/dev/null || true
                sleep 2
            fi

            systemctl restart ${SERVICE_NAME}.service
            sleep 5

            echo "Health check..."
            if systemctl is-active --quiet ${SERVICE_NAME}.service; then
                echo "Production admin service is running on port ${APP_PORT}!"
            else
                echo "Service failed!"
                journalctl -u ${SERVICE_NAME}.service --no-pager -n 30
                exit 1
            fi

            echo "=========================================="
            echo "PRODUCTION deployment complete!"
            echo "   URL: https://admin.globaleventstravels.com"
            echo "=========================================="

      - name: Deployment failed notification
        if: failure()
        run: |
          echo "PRODUCTION admin deployment failed!"
          echo "Check the logs above for details."
