# =============================================================================
# Global Events Travels - Frontend Deployment Workflow
# =============================================================================
# Deploys frontend/ (Astro static site) to VPS.
# Source is copied to VPS, env written before build, dist/ served by
# `serve` Node.js static server in SPA mode via systemd.
#
# DEPLOYMENT STRATEGY:
# --------------------
# - Push to `develop` branch -> STAGING  (port 3005, dev.globaleventstravels.com)
# - Push to `main` branch    -> PRODUCTION (port 3006, globaleventstravels.com)
#
# REQUIRED GITHUB SECRETS:
# ------------------------
# Repository Secrets:
#   SSH_HOST, SSH_USER, SSH_PASSWORD, SSH_PORT (optional, default 22)
#
# Environment Secrets:
#   ENV_FILE_FRONTEND - Full .env contents for this environment
#                       (PUBLIC_API_BASE_URL, PUBLIC_SITE_URL,
#                        PUBLIC_GOOGLE_MAPS_API_KEY, etc.)
#   IMPORTANT: PUBLIC_* vars are inlined at BUILD TIME — env file must be
#              written BEFORE `npm run build`.
#
# VPS PREREQUISITES:
# ------------------
# - Node.js 20+ installed
# - npm install -g serve
# - mkdir -p /home/glfdgdg-dev/htdocs/dev.globaleventstravels.com
# - mkdir -p /home/globaleventstravels-web/htdocs/globaleventstravels.com
# =============================================================================

name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# =============================================================================
# STAGING DEPLOYMENT
# =============================================================================
jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    environment:
      name: staging
      url: https://dev.globaleventstravels.com

    env:
      DEPLOY_PATH: /home/glfdgdg-dev/htdocs/dev.globaleventstravels.com
      SERVICE_NAME: globaleventstravels-staging-web
      APP_PORT: 3005

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files to Staging VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "frontend/"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1
          rm: false

      - name: Setup and restart staging service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            echo "=========================================="
            echo "Global Events Travels STAGING Frontend Deployment"
            echo "=========================================="

            DEPLOY_DIR="${{ env.DEPLOY_PATH }}"
            SERVICE_NAME="${{ env.SERVICE_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"

            cd "$DEPLOY_DIR"

            # IMPORTANT: write env BEFORE build (Astro/Vite inlines PUBLIC_* vars at build time)
            echo "Writing .env file (inlined at build time)..."
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE_FRONTEND }}
            ENVEOF
            chmod 600 .env

            echo "Cleaning previous build..."
            rm -rf dist 2>/dev/null || true

            echo "Installing dependencies (npm ci)..."
            npm ci --no-audit --no-fund

            echo "Building Astro site..."
            npm run build

            echo "Setting up systemd service..."
            cat > /etc/systemd/system/${SERVICE_NAME}.service << SERVICEEOF
            [Unit]
            Description=Global Events Travels Staging Frontend Service
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=${DEPLOY_DIR}
            Environment="NODE_ENV=production"
            Environment="PATH=/usr/local/bin:/usr/bin:/bin"
            ExecStart=/usr/local/bin/npx serve -s dist -l ${APP_PORT}
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            echo "Restarting service..."
            systemctl daemon-reload
            systemctl enable ${SERVICE_NAME}.service 2>/dev/null || true

            PID=$(lsof -t -i:${APP_PORT} 2>/dev/null) || true
            if [ -n "$PID" ]; then
                kill -9 $PID 2>/dev/null || true
                sleep 2
            fi

            systemctl restart ${SERVICE_NAME}.service
            sleep 5

            echo "Health check..."
            if systemctl is-active --quiet ${SERVICE_NAME}.service; then
                echo "Staging frontend service is running on port ${APP_PORT}!"
            else
                echo "Service failed!"
                journalctl -u ${SERVICE_NAME}.service --no-pager -n 30
                exit 1
            fi

            echo "=========================================="
            echo "STAGING deployment complete!"
            echo "   URL: https://dev.globaleventstravels.com"
            echo "=========================================="

# =============================================================================
# PRODUCTION DEPLOYMENT
# =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    environment:
      name: production
      url: https://globaleventstravels.com

    env:
      DEPLOY_PATH: /home/globaleventstravels-web/htdocs/globaleventstravels.com
      SERVICE_NAME: globaleventstravels-web
      APP_PORT: 3006

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files to Production VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "frontend/"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1
          rm: false

      - name: Setup and restart production service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            echo "=========================================="
            echo "Global Events Travels PRODUCTION Frontend Deployment"
            echo "=========================================="

            DEPLOY_DIR="${{ env.DEPLOY_PATH }}"
            SERVICE_NAME="${{ env.SERVICE_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"

            cd "$DEPLOY_DIR"

            # IMPORTANT: write env BEFORE build (Astro/Vite inlines PUBLIC_* vars at build time)
            echo "Writing .env file (inlined at build time)..."
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE_FRONTEND }}
            ENVEOF
            chmod 600 .env

            echo "Cleaning previous build..."
            rm -rf dist 2>/dev/null || true

            echo "Installing dependencies (npm ci)..."
            npm ci --no-audit --no-fund

            echo "Building Astro site..."
            npm run build

            echo "Setting up systemd service..."
            cat > /etc/systemd/system/${SERVICE_NAME}.service << SERVICEEOF
            [Unit]
            Description=Global Events Travels Production Frontend Service
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=${DEPLOY_DIR}
            Environment="NODE_ENV=production"
            Environment="PATH=/usr/local/bin:/usr/bin:/bin"
            ExecStart=/usr/local/bin/npx serve -s dist -l ${APP_PORT}
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            echo "Restarting service..."
            systemctl daemon-reload
            systemctl enable ${SERVICE_NAME}.service 2>/dev/null || true

            PID=$(lsof -t -i:${APP_PORT} 2>/dev/null) || true
            if [ -n "$PID" ]; then
                kill -9 $PID 2>/dev/null || true
                sleep 2
            fi

            systemctl restart ${SERVICE_NAME}.service
            sleep 5

            echo "Health check..."
            if systemctl is-active --quiet ${SERVICE_NAME}.service; then
                echo "Production frontend service is running on port ${APP_PORT}!"
            else
                echo "Service failed!"
                journalctl -u ${SERVICE_NAME}.service --no-pager -n 30
                exit 1
            fi

            echo "=========================================="
            echo "PRODUCTION deployment complete!"
            echo "   URL: https://globaleventstravels.com"
            echo "=========================================="

      - name: Deployment failed notification
        if: failure()
        run: |
          echo "PRODUCTION frontend deployment failed!"
          echo "Check the logs above for details."
